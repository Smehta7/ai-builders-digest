name: AI Builders Weekly Digest

on:
  schedule:
    # 10:56 AM IST = 05:26 UTC, every Saturday
    - cron: "26 5 * * 6"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone follow-builders skill
        run: |
          git clone https://github.com/zarazhangrui/follow-builders.git /tmp/follow-builders
          cd /tmp/follow-builders/scripts && npm install --silent

      - name: Fetch raw digest content
        id: fetch_content
        run: |
          cd /tmp/follow-builders/scripts
          node prepare-digest.js > /tmp/raw-digest.json 2>/dev/null || true
          # Validate we got usable JSON
          python3 -c "import json,sys; d=json.load(open('/tmp/raw-digest.json')); print('OK - builders:', len(d.get('x',[])), '| podcasts:', len(d.get('podcasts',[])))"

      - name: Install Python deps
        run: pip install google-genai --quiet

      - name: Remix + render + send digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: python3 digest/run_digest.py
